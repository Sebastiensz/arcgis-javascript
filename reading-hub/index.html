    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --border:  #2a2535;

      --muted:   #7a6f8a;

      --gold2:   #f0c040;
      --politique:  #c0392b;
      --societal:   #8e44ad;
      --economique: #27ae60;
      --romans:     #d4a017;
      --sciences:   #2980b9;
      --futur:      #16a085;
    }
    html, body { background: var(--bg); color: var(--text); font-family: Georgia, "Times New Roman", serif; font-size: 14px; min-height: 100%; }

    /* ── Header ───────────────── */
    header {
      background: linear-gradient(135deg, #12091a 0%, #0a0d1a 60%, #0d1209 100%);
      padding: 28px 32px 22px; border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 28px; font-weight: 700; color: var(--gold); letter-spacing: .5px; }
    header h1 em { font-style: italic; color: var(--gold2); }
    header p { color: var(--muted); font-size: 13px; margin-top: 6px; font-family: sans-serif; }
    #statsRow { display:flex; gap:24px; margin-top:18px; flex-wrap:wrap; }
    .st { text-align:center; padding:8px 16px; background:rgba(212,160,23,.08); border:1px solid rgba(212,160,23,.2); border-radius:8px; }
    .st .v { font-size:22px; font-weight:700; color:var(--gold2); font-family:sans-serif; }
    .st .l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-family:sans-serif; }

    /* ── Toolbar ──────────────── */
    #toolbar {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display:flex; flex-wrap:wrap; align-items:center;
      gap:10px; position:sticky; top:0; z-index:100;
    }
    #searchWrap { display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:5px 12px; flex:0 0 210px; }
    #searchWrap input { background:none; border:none; outline:none; color:var(--text); font-size:13px; width:100%; font-family:sans-serif; }
    .tabs { display:flex; gap:3px; flex-wrap:wrap; }
    .tab {
      padding:5px 14px; border-radius:5px; border:1px solid var(--border);
      background:var(--card); color:var(--muted); font-size:12px; font-weight:600;
      cursor:pointer; transition:all .15s; white-space:nowrap; font-family:sans-serif;
    }
    .tab:hover { color:var(--text); }
    .tab.on { background:var(--gold); border-color:var(--gold); color:#09080e; }
    .themes { display:flex; gap:4px; flex-wrap:wrap; margin-left:auto; }
    .tchip {
      padding:3px 10px; border-radius:12px; border:1px solid transparent;
      font-size:11px; font-weight:700; cursor:pointer; opacity:.45;
      transition:opacity .15s; font-family:sans-serif;
    }
    .tchip.on { opacity:1; }

    /* ── Grid ─────────────────── */
    #grid { padding:20px 24px; }

    /* ── Month layout ─────────── */
    .months-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:20px; }
    .month-card {
      background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden;
    }
    .month-header {
      padding:16px 20px; display:flex; align-items:center; gap:14px; border-bottom:1px solid var(--border);
    }
    .month-header .mnum { font-size:38px; font-weight:700; font-family:sans-serif; line-height:1; min-width:52px; }
    .month-header .minfo .mname { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; font-family:sans-serif; margin-bottom:3px; }
    .month-header .minfo h3 { font-size:15px; color:white; font-weight:700; line-height:1.3; }
    .month-week { border-bottom:1px solid rgba(42,37,53,.5); }
    .month-week:last-child { border-bottom:none; }
    .mw-label { padding:8px 16px 3px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; font-family:sans-serif; }
    .month-items { padding-bottom:4px; }
    .wi {
      display:flex; align-items:flex-start; gap:10px; padding:9px 16px;
      border-bottom:1px solid rgba(42,37,53,.7); cursor:pointer; transition:background .1s;
    }
    .wi:last-child { border-bottom:none; }
    .wi:hover { background:rgba(212,160,23,.06); }
    .wi-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
    .wi-info { flex:1; min-width:0; }
    .wi-title { font-size:13px; color:var(--text); line-height:1.3; }
    .wi-meta  { font-size:11px; color:var(--muted); margin-top:3px; font-family:sans-serif; }
    .wi-time  { font-size:10px; color:var(--gold); font-family:sans-serif; font-weight:700; white-space:nowrap; }

    /* ── Cards grid ───────────── */
    .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:16px; }

    /* ── Section header ───────── */
    .shdr { display:flex; align-items:center; gap:10px; padding:6px 0 10px; border-bottom:1px solid var(--border); margin-bottom:14px; margin-top:20px; }
    .shdr:first-child { margin-top:0; }
    .shdr h2 { font-size:17px; }
    .shdr .cnt { font-size:11px; color:var(--muted); font-family:sans-serif; }

    /* ── Item card ────────────── */
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:10px;
      padding:18px; display:flex; flex-direction:column; gap:9px;
      transition:transform .15s, box-shadow .15s; position:relative; overflow:hidden;
    }
    .card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.5); }
    .stripe { position:absolute; top:0; left:0; right:0; height:3px; border-radius:10px 10px 0 0; }
    .ctop  { display:flex; align-items:flex-start; gap:10px; }
    .cicon { font-size:30px; flex-shrink:0; line-height:1; }
    .ctitles { flex:1; min-width:0; }
    .ctitle  { font-size:14px; font-weight:700; color:white; line-height:1.3; }
    .cauthor { font-size:11px; color:var(--muted); margin-top:2px; font-family:sans-serif; }
    .badges  { display:flex; gap:5px; flex-wrap:wrap; }
    .badge   { font-size:10px; font-weight:700; padding:2px 7px; border-radius:8px; font-family:sans-serif; }
    .b-article { background:#1a1030; color:#c084fc; border:1px solid #3a2060; }
    .b-free    { background:#0f2010; color:#4ade80; border:1px solid #1d4020; }
    .b-cours   { background:#0a1a30; color:#60a5fa; border:1px solid #1a2a50; }
    .b-payant  { background:#2a1a08; color:#fbbf24; border:1px solid #4a2a08; }
    .b-time    { background:#1a1209; color:var(--gold); border:1px solid #3a2a09; }
    .cdesc { font-size:12px; color:var(--muted); line-height:1.6; font-family:sans-serif; }
    .cskill { font-size:11px; font-family:sans-serif; }
    .cskill strong { color:var(--gold2); }
    .csource { font-size:11px; color:var(--muted); font-family:sans-serif; }
    .csource span { color:var(--text); }
    .clink {
      display:block; text-align:center; padding:7px; border-radius:6px;
      border:1px solid var(--border); color:var(--muted); text-decoration:none;
      font-size:12px; font-weight:600; transition:all .15s; margin-top:auto;
      font-family:sans-serif;
    }
    .clink:hover { color:var(--gold); border-color:var(--gold); background:rgba(212,160,23,.08); }

    /* ── Prix badge ───────────── */
    .prix { font-size:11px; font-family:sans-serif; color:var(--muted); }
    .prix strong { color:#fbbf24; }

    #empty { text-align:center; padding:60px 20px; color:var(--muted); font-family:sans-serif; }
  </style>
</head>

  { num:11, name:"Novembre", title:"Science-Fiction & Futurs Possibles", color:"#9b59b6",
    weeks:[
      { label:"S1 · Herbert — politique, écologie, empire", ids:["dune"] },
      { label:"S2 · Gibson & les fondateurs du cyberpunk", ids:["neuromancer"] },
      { label:"S3 · H.G. Wells — les deux classiques fondateurs", ids:["machine-temps","guerre-mondes"] },
      { label:"S4 · Le Guin & Asimov — nouvelles essentielles", ids:["le-guin","asimov-last"] }
    ]
  },
  { num:12, name:"Décembre", title:"Futur, Singularité & Bilan Annuel", color:"#f39c12",
    weeks:[
      { label:"S1 · La Terre inhabitable", ids:["uninhabitable"] },
      { label:"S2 · Kurzweil — l'accélération exponentielle", ids:["singularity"] },
      { label:"S3 · Vos 3 coups de cœur — relecture & notes", ids:[] },
      { label:"S4 · Bilan & programme pour l'année suivante", ids:[] }
    ]
  }
];

/* ── LocalStorage ────────────────────────────── */
var READ_KEY = "rhub_read";
function loadRead() { try { return JSON.parse(localStorage.getItem(READ_KEY)||"[]"); } catch(e){ return []; } }
function saveRead(r){ localStorage.setItem(READ_KEY, JSON.stringify(r)); }
var readSet = loadRead();

/* ── State ───────────────────────────────────── */
var st = { tab:"annuel", theme:"all", q:"" };

/* ── Theme chips ─────────────────────────────── */
function initChips() {
  var el = document.getElementById("themeChips");
  var all = document.createElement("button");
  all.className = "tchip on"; all.setAttribute("data-th","all");
  all.textContent = "Tous thèmes"; all.style.border = "1px solid #555"; all.style.color = "#ccc";
  all.addEventListener("click", function(){ setTheme("all"); });
  el.appendChild(all);
  Object.keys(THEMES).forEach(function(k) {
    var b = document.createElement("button");
    b.className = "tchip"; b.setAttribute("data-th",k);
    b.textContent = THEMES[k].label;
    b.style.color = THEMES[k].color; b.style.border = "1px solid " + THEMES[k].color + "60";
    b.addEventListener("click", function(){ setTheme(k); });
    el.appendChild(b);
  });
}
function setTheme(t) {
  st.theme = t;
  document.querySelectorAll(".tchip").forEach(function(c){ c.classList.toggle("on", c.getAttribute("data-th") === t); });
  render();
}

/* ── Helpers ─────────────────────────────────── */
var TYPE_LABELS = { article:"📰 Article", gratuit:"📚 Livre gratuit", cours:"🎓 Cours", payant:"💳 Livre payant" };
var TYPE_BADGE  = { article:"b-article", gratuit:"b-free", cours:"b-cours", payant:"b-payant" };
function matchSearch(s) {
  if (!st.q) return true;
  var q = st.q.toLowerCase();
  return [s.title,s.author,s.desc,s.skill].some(function(t){ return (t||"").toLowerCase().includes(q); });
}
function matchTheme(s) { return st.theme === "all" || s.theme === st.theme; }
function matchTab(s) {
  if (st.tab === "tout")     return true;
  if (st.tab === "articles") return s.type === "article";
  if (st.tab === "gratuits") return s.type === "gratuit";
  if (st.tab === "cours")    return s.type === "cours";
  if (st.tab === "payants")  return s.type === "payant";
  return true;
}

/* ── Card HTML ───────────────────────────────── */
function cardHTML(s) {
  var col = THEMES[s.theme].color;
  var isRead = readSet.includes(s.id);
  return '<div class="card" id="c-'+s.id+'" style="'+(isRead?'opacity:.55;':'')+'">'
    + '<div class="stripe" style="background:'+col+'"></div>'
    + '<div class="ctop">'
    +   '<div class="cicon">'+s.icon+'</div>'
    +   '<div class="ctitles">'
    +     '<div class="ctitle">'+s.title+'</div>'
    +     '<div class="cauthor">'+s.author+(s.year?' · '+s.year:'')+'</div>'
    +   '</div>'
    + '</div>'
    + '<div class="badges">'
    +   '<span class="badge '+TYPE_BADGE[s.type]+'">'+TYPE_LABELS[s.type]+'</span>'
    +   '<span class="badge" style="background:'+col+'18;color:'+col+';border:1px solid '+col+'40">'+THEMES[s.theme].label+'</span>'
    +   '<span class="badge b-time">⏱ '+s.time+'</span>'
    + '</div>'
    + '<div class="cdesc">'+s.desc+'</div>'
    + '<div class="cskill">✦ Compétence/problème : <strong>'+s.skill+'</strong></div>'
    + (s.where ? '<div class="csource">🔍 Où : <span>'+s.where+'</span></div>' : '')
    + (s.prix  ? '<div class="prix">💳 Prix estimé : <strong>'+s.prix+'</strong></div>' : '')
    + '<div style="display:flex;gap:8px;margin-top:4px">'
    + (s.url ? '<a class="clink" style="flex:1" href="'+s.url+'" target="_blank" rel="noopener">→ Accéder</a>' : '<div class="clink" style="flex:1;cursor:default;opacity:.4">🔒 Payant / Librairie</div>')
    + '<button class="clink" style="width:80px;background:'+(isRead?'rgba(212,160,23,.2)':'none')+';border-color:'+(isRead?'var(--gold)':'var(--border)')+';color:'+(isRead?'var(--gold)':'var(--muted)')+';" onclick="toggleRead(\''+s.id+'\')">'+(isRead?'✓ Lu':'Marquer')+'</button>'
    + '</div>'
    + '</div>';
}

window.toggleRead = function(id) {
  var i = readSet.indexOf(id);
  if (i >= 0) readSet.splice(i,1); else readSet.push(id);
  saveRead(readSet);
  document.getElementById("sRead").textContent = readSet.length;
  render();
};

/* ── Render ──────────────────────────────────── */
function render() {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  document.getElementById("sRead").textContent = readSet.length;

  if (st.tab === "annuel") renderMonths(grid);
  else renderCards(grid);
}

function renderMonths(grid) {
  var wrap = document.createElement("div");
  wrap.className = "months-grid";

  MONTHS.forEach(function(m) {
    var mc = document.createElement("div");
    mc.className = "month-card";

    var header = '<div class="month-header" style="border-top:3px solid '+m.color+'">'
      + '<div class="mnum" style="color:'+m.color+'">'+String(m.num).padStart(2,'0')+'</div>'
      + '<div class="minfo"><div class="mname">'+m.name+'</div><h3>'+m.title+'</h3></div>'
      + '</div>';

    var body = '';
    m.weeks.forEach(function(w) {
      var items = w.ids.map(function(id){ return ITEMS.find(function(s){ return s.id===id; }); }).filter(Boolean);
      body += '<div class="month-week">';
      body += '<div class="mw-label" style="color:'+m.color+'">'+w.label+'</div>';
      body += '<div class="month-items">';
      if (items.length === 0) {
        body += '<div class="wi" style="opacity:.35;cursor:default"><div class="wi-icon">✨</div>'
          + '<div class="wi-info"><div class="wi-title">Relecture · Notes · Réflexion personnelle</div></div></div>';
      } else {
        items.forEach(function(s) {
          var col = THEMES[s.theme].color;
          var isRead = readSet.includes(s.id);
          body += '<div class="wi" onclick="scrollToCard(\''+s.id+'\')">'
            + '<div class="wi-icon">'+s.icon+'</div>'
            + '<div class="wi-info">'
            +   '<div class="wi-title" style="text-decoration:'+(isRead?'line-through':'none')+';opacity:'+(isRead?.55:1)+'">'+s.title+'</div>'
            +   '<div class="wi-meta"><span style="color:'+col+'">'+THEMES[s.theme].label+'</span> · '+TYPE_LABELS[s.type]+' · '+s.time+'</div>'
            + '</div>'
            + '<div class="wi-time" style="color:'+(isRead?'var(--gold)':'var(--muted)')+'">'+(isRead?'✓':'→')+'</div>'
            + '</div>';
        });
      }
      body += '</div></div>';
    });

    mc.innerHTML = header + body;
    wrap.appendChild(mc);
  });

  grid.appendChild(wrap);
}

window.scrollToCard = function(id) {
  st.tab = "tout";
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.toggle("on", t.getAttribute("data-tab")==="tout"); });
  render();
  setTimeout(function(){
    var el = document.getElementById("c-"+id);
    if (el) { el.scrollIntoView({behavior:"smooth",block:"center"}); el.style.boxShadow="0 0 0 2px var(--gold)"; setTimeout(function(){ el.style.boxShadow=""; },2000); }
  },100);
};

function renderCards(grid) {
  var items = ITEMS.filter(function(s){ return matchTab(s) && matchTheme(s) && matchSearch(s); });
  if (!items.length) { grid.innerHTML='<div id="empty">Aucun résultat pour ces filtres.</div>'; return; }

  var grouped = {};
  items.forEach(function(s){ if(!grouped[s.theme]) grouped[s.theme]=[]; grouped[s.theme].push(s); });

  Object.keys(THEMES).forEach(function(th) {
    var gi = grouped[th];
    if (!gi || !gi.length) return;
    var shdr = document.createElement("div");
    shdr.className = "shdr";
    shdr.innerHTML = '<h2 style="color:'+THEMES[th].color+'">'+THEMES[th].label+'</h2><span class="cnt">'+gi.length+' élément'+(gi.length>1?'s':'')+'</span>';
    grid.appendChild(shdr);
    var cg = document.createElement("div");
    cg.className = "cards-grid";
    cg.innerHTML = gi.map(cardHTML).join("");
    grid.appendChild(cg);
  });
}

/* ── Events ─────────────────────────────────── */
document.getElementById("srch").addEventListener("input", function(){ st.q = this.value; render(); });
document.querySelectorAll(".tab").forEach(function(b){
  b.addEventListener("click", function(){
    st.tab = this.getAttribute("data-tab");
    document.querySelectorAll(".tab").forEach(function(x){ x.classList.toggle("on", x===b); });
    render();
  });
});

initChips();
render();
</script>
</body>
</html>
