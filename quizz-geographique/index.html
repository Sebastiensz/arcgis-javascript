<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Quiz Géographique – Pays du monde</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.30/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0; margin: 0;
      height: 100%; width: 100%;
      font-family: "Avenir Next", Avenir, Helvetica, Arial, sans-serif;
    }

    #progressBar {
      position: absolute; top: 0; left: 0;
      height: 5px; width: 0%;
      background: linear-gradient(90deg, #27AE60, #2ECC71);
      transition: width 0.4s ease; z-index: 20;
    }

    #questionPanel {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; align-items: center;
    }

    #titleDiv {
      width: 100%; padding: 7px 16px;
      font-size: 15px; font-weight: bold;
      text-align: center; color: white;
      background-color: #007AC2; box-sizing: border-box;
    }

    #questionDiv {
      margin-top: 6px; padding: 10px 24px;
      background: rgba(0, 60, 100, 0.88);
      border-radius: 8px; text-align: center; color: white;
      min-width: 260px;
    }

    #questionLabel { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
    #questionText  { font-size: 24px; font-weight: bold; display: block; }
    #questionNum   { font-size: 12px; opacity: 0.75; margin-top: 4px; }

    /* Taux de réussite affiché sous le nom du pays */
    #countryStatDiv {
      margin-top: 6px; font-size: 12px;
      opacity: 0.85; display: none;
    }
    .stat-pill {
      display: inline-block; padding: 2px 8px;
      border-radius: 10px; font-size: 11px; font-weight: bold;
    }
    .stat-easy   { background: rgba(39,174,96,0.7); }
    .stat-medium { background: rgba(241,196,15,0.7); }
    .stat-hard   { background: rgba(192,57,43,0.7); }

    #scoreDiv {
      position: absolute; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px; background: rgba(0,0,0,0.72);
      border-radius: 20px; color: white;
      font-size: 16px; font-weight: bold;
      z-index: 10; pointer-events: none; white-space: nowrap;
    }

    #feedbackDiv {
      position: absolute; top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 32px; border-radius: 10px;
      font-size: 22px; font-weight: bold; color: white;
      z-index: 30; text-align: center; display: none;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      animation: popIn 0.2s ease;
    }
    @keyframes popIn {
      from { transform: translate(-50%,-50%) scale(0.85); opacity: 0; }
      to   { transform: translate(-50%,-50%) scale(1);    opacity: 1; }
    }
    #feedbackDiv.correct { background: rgba(39,174,96,0.95); }
    #feedbackDiv.wrong   { background: rgba(192,57,43,0.95); }

    #hintDiv {
      position: absolute; bottom: 65px; left: 50%;
      transform: translateX(-50%);
      padding: 6px 16px; background: rgba(255,255,255,0.82);
      border-radius: 16px; font-size: 13px; color: #333;
      z-index: 10; pointer-events: none; white-space: nowrap;
    }

    /* ── Écran de fin ─────────────────────────────── */
    #gameOverDiv {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      padding: 24px 32px; background: white;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      text-align: center; z-index: 40; display: none;
      width: 360px; max-height: 88vh; overflow-y: auto;
    }

    #gameOverDiv h2 { margin: 0 0 2px 0; color: #007AC2; font-size: 22px; }
    #finalScore { font-size: 52px; font-weight: bold; color: #222; line-height: 1; margin: 4px 0; }
    #gradeText  { font-size: 15px; color: #555; margin-bottom: 12px; }

    /* Stats globales */
    .stats-block {
      background: #f0f7ff; border-radius: 8px;
      padding: 10px 14px; margin: 10px 0;
      font-size: 13px; color: #333; text-align: left;
    }
    .stats-block h4 { margin: 0 0 8px 0; font-size: 13px; color: #007AC2; text-transform: uppercase; letter-spacing: 0.5px; }

    #percentileBar {
      width: 100%; height: 8px; background: #dde;
      border-radius: 4px; margin: 6px 0; overflow: hidden;
    }
    #percentileFill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, #007AC2, #27AE60);
      transition: width 1s ease; width: 0%;
    }

    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 12px; font-size: 12px; font-weight: bold;
      margin: 3px 2px;
    }
    .badge-gold   { background: #FEF9E7; color: #7D6608; border: 1px solid #F1C40F; }
    .badge-silver { background: #F2F3F4; color: #555;    border: 1px solid #BDC3C7; }
    .badge-blue   { background: #EBF5FB; color: #1A5276; border: 1px solid #85C1E9; }

    /* Leaderboard */
    #leaderboardSection h4 { margin: 0 0 6px 0; font-size: 13px; color: #007AC2; text-transform: uppercase; letter-spacing: 0.5px; }

    table.lb {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    table.lb th { padding: 4px 6px; border-bottom: 2px solid #e0e0e0; color: #888; font-size: 11px; text-align: left; }
    table.lb td { padding: 4px 6px; }
    table.lb tr:nth-child(even) { background: #fafafa; }
    table.lb tr.my-row td { color: #1A5276; font-weight: bold; }

    /* Pays difficiles */
    #hardCountriesSection h4 { margin: 0 0 6px 0; font-size: 13px; color: #C0392B; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Boutons */
    .end-buttons { margin-top: 14px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .btn-primary   { padding: 9px 20px; background: #007AC2; color: white; border: none; border-radius: 7px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-primary:hover { background: #005f99; }
    .btn-secondary { padding: 9px 20px; background: white; color: #007AC2; border: 2px solid #007AC2; border-radius: 7px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-secondary:hover { background: #f0f7ff; }

    #localNote { font-size: 11px; color: #bbb; margin-top: 10px; }
  </style>

  <script>
    // ══════════════════════════════════════════════════
    //  PERSISTANCE  —  localStorage uniquement
    //  Aucun service tiers, données dans votre navigateur
    // ══════════════════════════════════════════════════
    var LS_KEY = "quiz-geo";

    function dbLoad() {
      try {
        return JSON.parse(localStorage.getItem(LS_KEY)) || { scores: [], countries: {} };
      } catch(e) {
        return { scores: [], countries: {} };
      }
    }

    function dbSave(db) {
      try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch(e) {}
    }

    // Appelé quand un pays est affiché comme question
    function dbCountryShown(name) {
      var db = dbLoad();
      if (!db.countries[name]) db.countries[name] = { shown: 0, found: 0 };
      db.countries[name].shown++;
      dbSave(db);
    }

    // Appelé quand la réponse est correcte
    function dbCountryFound(name) {
      var db = dbLoad();
      if (!db.countries[name]) db.countries[name] = { shown: 0, found: 0 };
      db.countries[name].found++;
      dbSave(db);
    }

    // Appelé en fin de partie, retourne tout l'historique
    function dbSaveScore(pts, total) {
      var db = dbLoad();
      db.scores.push({ score: pts, total: total, date: Date.now() });
      if (db.scores.length > 200) db.scores = db.scores.slice(-200);
      dbSave(db);
      return db;
    }

    function dbGetCountryStat(name) {
      return (dbLoad().countries[name]) || null;
    }

    // ══════════════════════════════════════════════════
    require([
      "esri/Map", "esri/views/MapView",
      "esri/layers/GeoJSONLayer", "esri/widgets/Home"
    ], function(Map, MapView, GeoJSONLayer, Home) {

      var TOTAL  = 20;
      var FEEDBACK_MS = 1800;

      var country_table = [];
      var pts = 0, question = 0, randValue = 0, prevRandValue = -1;
      var clickLocked = true;

      // ── Carte ──────────────────────────────────────
      var map  = new Map({ basemap: "satellite" });
      var view = new MapView({
        container: "viewDiv", map: map, zoom: 3,
        constraints: { maxZoom: 14, minZoom: 2 }
      });

      var layer = new GeoJSONLayer({
        url: "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson",
        copyright: "Natural Earth",
        popupEnabled: false,
        outFields: ["NAME_FR"],
        renderer: {
          type: "simple",
          symbol: { type: "simple-fill", color: [0,0,0,0],
            outline: { color: [255,255,255,0.6], width: 1 } }
        }
      });

      map.add(layer);
      view.ui.add(new Home({ view: view }), "bottom-left");

      // ── Refs UI ────────────────────────────────────
      var $ = function(id) { return document.getElementById(id); };
      var questionTextEl   = $("questionText");
      var questionNumEl    = $("questionNum");
      var countryStatDiv   = $("countryStatDiv");
      var scoreEl          = $("scoreDiv");
      var feedbackEl       = $("feedbackDiv");
      var hintEl           = $("hintDiv");
      var progressEl       = $("progressBar");
      var gameOverEl       = $("gameOverDiv");
      var finalScoreEl     = $("finalScore");
      var gradeEl          = $("gradeText");
      var percentileFill   = $("percentileFill");
      var percentileText   = $("percentileText");
      var personalStats    = $("personalStats");
      var leaderboardBody  = $("leaderboardBody");
      var hardCountriesEl  = $("hardCountriesEl");

      // ── Chargement ─────────────────────────────────
      layer.load().then(function() {
        return layer.queryFeatures({
          where: "NAME_FR IS NOT NULL",
          outFields: ["NAME_FR"],
          returnGeometry: false, num: 300
        });
      }).then(function(result) {
        var seen = {};
        country_table = result.features
          .map(function(f) { return f.attributes.NAME_FR; })
          .filter(function(n) {
            if (!n || seen[n]) return false;
            seen[n] = true; return true;
          });
        startGame();
      }).catch(function(err) {
        questionTextEl.innerHTML = "Erreur de chargement";
        console.error(err);
      });

      // ── Jeu ────────────────────────────────────────

      function startGame() {
        pts = 0; question = 0; prevRandValue = -1;
        clickLocked = false;
        view.graphics.removeAll();
        gameOverEl.style.display = "none";
        progressEl.style.width = "0%";
        nextQuestion();
      }

      function nextQuestion() {
        question++;
        if (question > TOTAL) { endGame(); return; }
        view.graphics.removeAll();
        do {
          randValue = Math.floor(Math.random() * country_table.length);
        } while (randValue === prevRandValue && country_table.length > 1);
        prevRandValue = randValue;

        var name = country_table[randValue];
        questionTextEl.innerHTML = name;
        questionNumEl.innerHTML  = "Question " + question + " / " + TOTAL;
        scoreEl.innerHTML        = "Score : " + pts + " / " + (question - 1);
        progressEl.style.width   = ((question - 1) / TOTAL * 100) + "%";
        hintEl.style.display     = "block";
        clickLocked = false;

        // Enregistrer que le pays a été affiché
        dbCountryShown(name);

        // Afficher le taux de réussite perso sur ce pays
        showCountryStat(name);
      }

      function showCountryStat(name) {
        var stat = dbGetCountryStat(name);
        // shown a déjà été incrémenté, donc on regarde l'historique avant cette question
        var historique = stat ? stat.shown - 1 : 0;
        if (!stat || historique < 1) {
          countryStatDiv.style.display = "none";
          return;
        }
        var pct  = Math.round(stat.found / historique * 100);
        var cls  = pct >= 70 ? "stat-easy" : pct >= 40 ? "stat-medium" : "stat-hard";
        var icon = pct >= 70 ? "✅" : pct >= 40 ? "⚠️" : "❌";
        countryStatDiv.innerHTML =
          '<span class="stat-pill ' + cls + '">' + icon + ' ' + pct + '% de réussite</span>' +
          ' <span style="opacity:0.7;font-size:10px">(' + stat.found + '/' + historique + ')</span>';
        countryStatDiv.style.display = "block";
      }

      function endGame() {
        clickLocked = true;
        hintEl.style.display = "none";
        view.graphics.removeAll();
        progressEl.style.width = "100%";
        scoreEl.innerHTML = "Partie terminée !";

        var pct   = Math.round(pts / TOTAL * 100);
        var grade = pct === 100 ? "Parfait ! Expert absolu ! 🌍"
                  : pct >= 80  ? "Excellent ! 🌟"
                  : pct >= 60  ? "Bien joué !"
                  : pct >= 40  ? "Pas mal, continuez !"
                  :              "Entraînez-vous encore !";

        finalScoreEl.innerHTML = pts + " / " + TOTAL;
        gradeEl.innerHTML = grade;
        gameOverEl.style.display = "block";

        var db = dbSaveScore(pts, TOTAL);
        renderEndStats(db);
      }

      function renderEndStats(db) {
        var scores = db.scores;
        var n = scores.length;

        // ── Percentile vs historique perso ──
        var beaten     = scores.filter(function(e) { return e.score < pts; }).length;
        // La partie actuelle est déjà dans db.scores, donc -1 pour l'exclure du dénominateur
        var denominator = Math.max(n - 1, 1);
        var percentile  = n > 1 ? Math.round(beaten / denominator * 100) : 100;
        var topPct      = 100 - percentile;

        percentileFill.style.width = percentile + "%";
        percentileText.innerHTML = n > 1
          ? "Mieux que <strong>" + percentile + "%</strong> de vos parties précédentes"
          : "Première partie ! Revenez pour voir vos progrès.";

        var badge = "";
        if (n > 1) {
          if (topPct <= 5)       badge = '<span class="badge badge-gold">🏆 Votre meilleur !</span>';
          else if (topPct <= 10) badge = '<span class="badge badge-gold">🥇 Top 10% perso</span>';
          else if (topPct <= 25) badge = '<span class="badge badge-silver">🥈 Top 25% perso</span>';
          else if (topPct <= 50) badge = '<span class="badge badge-blue">Top 50% perso</span>';
        }

        var avg    = n > 0 ? (scores.reduce(function(s,e){return s+e.score;},0)/n).toFixed(1) : "-";
        var best   = n > 0 ? Math.max.apply(null, scores.map(function(e){return e.score;})) : pts;

        personalStats.innerHTML =
          badge +
          '<div style="margin-top:6px">' +
          '<div style="margin:3px 0">📊 Moyenne personnelle : <strong>' + avg + ' / ' + TOTAL + '</strong></div>' +
          '<div style="margin:3px 0">🏅 Meilleur score : <strong>' + best + ' / ' + TOTAL + '</strong></div>' +
          '<div style="margin:3px 0">🎮 Parties jouées : <strong>' + n + '</strong></div>' +
          '</div>';

        // ── Top 10 personnel ──
        var sorted = scores.slice().sort(function(a,b){return b.score-a.score;}).slice(0,10);
        var html = "";
        sorted.forEach(function(e, i) {
          var medals = ["🥇","🥈","🥉"];
          var isThis = e.score === pts && i === sorted.findIndex(function(x){return x.score===pts;});
          html += '<tr class="' + (isThis ? "my-row" : "") + '">'
            + '<td>' + (medals[i] || (i+1)) + '</td>'
            + '<td style="text-align:right;font-weight:bold">' + e.score + '/' + TOTAL + '</td>'
            + '<td style="text-align:right;color:#888;font-size:11px">' + fmtDate(e.date) + '</td>'
            + '</tr>';
        });
        leaderboardBody.innerHTML = html || '<tr><td colspan="3" style="color:#aaa;text-align:center">Aucun historique</td></tr>';

        // ── Pays les plus difficiles (≥3 apparitions, <50% réussite) ──
        var countries = db.countries;
        var hard = Object.keys(countries)
          .filter(function(k) { return countries[k].shown >= 3; })
          .map(function(k) {
            var s = countries[k];
            return { name: k, pct: Math.round(s.found / s.shown * 100), shown: s.shown };
          })
          .sort(function(a,b){ return a.pct - b.pct; })
          .slice(0, 5);

        if (hard.length) {
          var h = "";
          hard.forEach(function(c) {
            var bar = Math.round(c.pct / 100 * 80);
            h += '<div style="margin:5px 0">'
              + '<div style="display:flex;justify-content:space-between;font-size:12px">'
              + '<span>' + escHtml(c.name) + '</span>'
              + '<span style="font-weight:bold;color:' + (c.pct<40?"#C0392B":"#F39C12") + '">' + c.pct + '%</span>'
              + '</div>'
              + '<div style="height:5px;background:#eee;border-radius:3px;margin-top:2px">'
              + '<div style="height:100%;width:' + bar + 'px;background:' + (c.pct<40?"#C0392B":"#F39C12") + ';border-radius:3px"></div>'
              + '</div>'
              + '</div>';
          });
          hardCountriesEl.innerHTML = h;
          $("hardSection").style.display = "block";
        } else {
          $("hardSection").style.display = "none";
        }
      }

      function fmtDate(ts) {
        var d = new Date(ts);
        return d.toLocaleDateString("fr-FR", { day:"2-digit", month:"2-digit" });
      }

      function escHtml(s) {
        return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }

      // ── Clic sur la carte ──────────────────────────
      view.on("click", function(event) {
        if (clickLocked || !country_table.length || question < 1 || question > TOTAL) return;
        clickLocked = true;

        layer.queryFeatures({
          geometry: event.mapPoint,
          spatialRelationship: "intersects",
          returnGeometry: true,
          outFields: ["NAME_FR"]
        }).then(function(response) {
          if (!response.features.length) { clickLocked = false; return; }

          var clickedName = response.features[0].attributes.NAME_FR;
          var correct = clickedName === country_table[randValue];

          if (correct) dbCountryFound(country_table[randValue]);

          var f = response.features[0].clone();
          f.symbol = {
            type: "simple-fill",
            color: correct ? [39,174,96,0.45] : [192,57,43,0.45],
            outline: { color: correct ? "#27AE60" : "#C0392B", width: "3px" }
          };
          view.graphics.add(f);
          view.goTo(f.geometry.extent.expand(2.5), { duration: 600 });

          if (correct) {
            pts++;
            showFeedback(true, null);
          } else {
            highlightCorrect(function() { showFeedback(false, country_table[randValue]); });
          }
        }).catch(function() { clickLocked = false; });
      });

      function highlightCorrect(callback) {
        var safe = country_table[randValue].replace(/'/g, "''");
        layer.queryFeatures({
          where: "NAME_FR = '" + safe + "'",
          outFields: ["NAME_FR"], returnGeometry: true
        }).then(function(r) {
          if (r.features.length) {
            var f = r.features[0].clone();
            f.symbol = {
              type: "simple-fill", color: [39,174,96,0.25],
              outline: { color: "#27AE60", width: "3px" }
            };
            view.graphics.add(f);
            view.goTo(f.geometry.extent.expand(2.5), { duration: 600 });
          }
          callback();
        }).catch(callback);
      }

      function showFeedback(correct, correctName) {
        feedbackEl.className = correct ? "correct" : "wrong";
        feedbackEl.innerHTML = correct
          ? "✓ Bonne réponse !"
          : "✗ C'était : <em>" + correctName + "</em>";
        feedbackEl.style.display = "block";
        hintEl.style.display = "none";
        setTimeout(function() {
          feedbackEl.style.display = "none";
          nextQuestion();
        }, FEEDBACK_MS);
      }

      $("restartBtn").addEventListener("click", startGame);
    });
  </script>
</head>
<body>
  <div id="progressBar"></div>
  <div id="viewDiv"></div>

  <div id="questionPanel">
    <div id="titleDiv">🌍 Quiz Géographique – Pays du monde</div>
    <div id="questionDiv">
      <div id="questionLabel">Cliquez sur le pays :</div>
      <span id="questionText">Chargement…</span>
      <div id="questionNum"></div>
      <div id="countryStatDiv"></div>
    </div>
  </div>

  <div id="scoreDiv">Score : 0 / 0</div>
  <div id="hintDiv">👆 Cliquez sur le pays indiqué</div>
  <div id="feedbackDiv"></div>

  <!-- ── Écran de fin ────────────────────────────── -->
  <div id="gameOverDiv">
    <h2>Partie terminée !</h2>
    <div id="finalScore"></div>
    <div id="gradeText"></div>

    <!-- Percentile perso -->
    <div class="stats-block">
      <h4>📈 Vos statistiques</h4>
      <div id="percentileText"></div>
      <div id="percentileBar"><div id="percentileFill"></div></div>
      <div id="personalStats"></div>
    </div>

    <!-- Pays difficiles -->
    <div class="stats-block" id="hardSection">
      <h4>🎯 Pays à travailler</h4>
      <div id="hardCountriesEl"></div>
    </div>

    <!-- Top 10 personnel -->
    <div class="stats-block" id="leaderboardSection">
      <h4>🏆 Votre top 10 personnel</h4>
      <table class="lb" style="width:100%">
        <thead>
          <tr><th>#</th><th style="text-align:right">Score</th><th style="text-align:right">Date</th></tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>

    <div id="localNote">💾 Statistiques sauvegardées dans votre navigateur</div>

    <div class="end-buttons">
      <button id="restartBtn" class="btn-primary">↺ Rejouer</button>
    </div>
  </div>
</body>
</html>
