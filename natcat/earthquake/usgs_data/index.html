<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Séismes en temps réel — USGS</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.30/esri/themes/dark/main.css">
  <script src="https://js.arcgis.com/4.30/"></script>
  <style>
    html, body, #viewDiv { padding:0; margin:0; height:100%; width:100%; }

    /* ── Panneaux custom positionnés en absolu ── */
    #panel {
      position: absolute;
      top: 15px;
      left: 60px;
      z-index: 10;
      background: rgba(13,12,20,.92);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e8e0d5;
      min-width: 240px;
      backdrop-filter: blur(8px);
      pointer-events: auto;
    }
    #panel h2 { font-size: 15px; font-weight: 700; color: white; margin: 0 0 2px; }
    #panel .sub { font-size: 11px; color: #7a6f8a; margin-bottom: 12px; }
    .kpis { display: flex; gap: 7px; }
    .kpi { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09); border-radius: 7px; padding: 8px 12px; flex: 1; min-width: 0; }
    .kpi .kv { font-size: 18px; font-weight: 700; color: white; font-family: monospace; line-height: 1; }
    .kpi .kl { font-size: 9px; color: #7a6f8a; text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }
    .kpi.red    .kv { color: #ef4444; }
    .kpi.orange .kv { color: #f97316; }

    #controls {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 10;
      background: rgba(13,12,20,.92);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      backdrop-filter: blur(8px);
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }
    .ctrl-label {
      font-size: 10px; color: #7a6f8a; text-transform: uppercase;
      letter-spacing: .6px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;
    }
    .ctrl-label span { color: white; font-size: 12px; font-family: monospace; font-weight: 700; }

    select.ctrl-select {
      width: 100%; font-size: 12px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      color: white; padding: 6px 10px; border-radius: 5px; cursor: pointer;
      outline: none;
    }
    select.ctrl-select option { background: #17151f; }

    input[type=range] {
      width: 100%; accent-color: #ef4444; cursor: pointer; margin-top: 3px;
      height: 4px;
    }

    #source {
      position: absolute;
      bottom: 25px;
      right: 15px;
      z-index: 10;
      background: rgba(13,12,20,.85);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 10px;
      color: #7a6f8a;
      font-family: sans-serif;
      text-align: center;
      pointer-events: auto;
    }
    #source a { color: #d4a017; text-decoration: none; }

    /* ── Loading overlay ── */
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(13,12,20,.93); border-radius: 10px; padding: 18px 28px;
      text-align: center; font-family: sans-serif; color: #e8e0d5; font-size: 13px;
      z-index: 100; pointer-events: none; transition: opacity .4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
<div id="viewDiv"></div>
<div id="loading">⏳ Chargement des données USGS…</div>

<!-- Info panel — top-left -->
<div id="panel">
  <h2>🌍 Séismes en temps réel</h2>
  <div class="sub">USGS Earthquake Hazards Program</div>
  <div class="kpis">
    <div class="kpi">
      <div class="kv" id="kv-count">–</div>
      <div class="kl">Total</div>
    </div>
    <div class="kpi red">
      <div class="kv" id="kv-max">–</div>
      <div class="kl">Mag. max</div>
    </div>
    <div class="kpi orange">
      <div class="kv" id="kv-sig">–</div>
      <div class="kl">M ≥ 5</div>
    </div>
  </div>
</div>

<!-- Controls — top-right -->
<div id="controls">
  <div>
    <div class="ctrl-label">Période de temps</div>
    <select class="ctrl-select" id="periodSelect">
      <option value="all_month">Dernier mois — Tous</option>
      <option value="all_week">Dernière semaine — Tous</option>
      <option value="all_day">Dernier jour — Tous</option>
      <option value="all_hour">Dernière heure — Tous</option>
      <option value="significant_month">Mois — Significatifs seulement</option>
      <option value="4.5_month">Mois — Magnitude ≥ 4.5</option>
      <option value="2.5_month">Mois — Magnitude ≥ 2.5</option>
    </select>
  </div>
  <div>
    <div class="ctrl-label">
      Magnitude minimum
      <span id="magVal">0</span>
    </div>
    <input type="range" id="magSlider" min="0" max="8" step="0.5" value="0">
  </div>
</div>

<!-- Source credit — bottom-right -->
<div id="source">
  Données : <a href="https://earthquake.usgs.gov/earthquakes/feed/v1.0/geojson.php" target="_blank">USGS Real-time Feeds</a> · Actualisé en temps réel
</div>

<script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/GeoJSONLayer",
  "esri/widgets/Legend",
  "esri/widgets/Expand",
  "esri/widgets/Home",
  "esri/widgets/Search",
  "esri/widgets/Zoom"
], function(Map, MapView, GeoJSONLayer, Legend, Expand, Home, Search, Zoom) {

  const BASE = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/";

  /* ── Renderer ── */
  const renderer = {
    type: "class-breaks",
    field: "mag",
    classBreakInfos: [
      {
        minValue: -10, maxValue: 1,
        symbol: { type: "simple-marker", color: [160,200,240,.60], outline: { color: [255,255,255,.2], width: .5 } },
        label: "< 1 — Microsismique"
      },
      {
        minValue: 1, maxValue: 2,
        symbol: { type: "simple-marker", color: [80,200,100,.70], outline: { color: [255,255,255,.25], width: .5 } },
        label: "1 – 2 — Mineur"
      },
      {
        minValue: 2, maxValue: 3,
        symbol: { type: "simple-marker", color: [240,210,0,.78], outline: { color: [255,255,255,.3], width: .5 } },
        label: "2 – 3 — Léger"
      },
      {
        minValue: 3, maxValue: 4,
        symbol: { type: "simple-marker", color: [255,135,0,.83], outline: { color: [255,255,255,.35], width: 1 } },
        label: "3 – 4 — Modéré"
      },
      {
        minValue: 4, maxValue: 5,
        symbol: { type: "simple-marker", color: [245,55,20,.88], outline: { color: [255,200,180,.5], width: 1 } },
        label: "4 – 5 — Fort"
      },
      {
        minValue: 5, maxValue: 6,
        symbol: { type: "simple-marker", color: [200,0,0,.92], outline: { color: [255,160,160,.65], width: 1.5 } },
        label: "5 – 6 — Majeur"
      },
      {
        minValue: 6, maxValue: 30,
        symbol: { type: "simple-marker", color: [90,0,0,.96], outline: { color: [255,80,80,.85], width: 2.5 } },
        label: "≥ 6 — Dévastateur"
      }
    ],
    visualVariables: [{
      type: "size",
      field: "mag",
      stops: [
        { value: 0, size: "2px"  },
        { value: 1, size: "4px"  },
        { value: 2, size: "7px"  },
        { value: 3, size: "12px" },
        { value: 4, size: "18px" },
        { value: 5, size: "30px" },
        { value: 6, size: "48px" },
        { value: 7, size: "70px" },
        { value: 8, size: "95px" }
      ]
    }]
  };

  /* ── Popup ── */
  const popupTemplate = {
    title: "{place}",
    content: [{
      type: "fields",
      fieldInfos: [
        { fieldName: "mag",    label: "⚡ Magnitude",        format: { places: 1 } },
        { fieldName: "depth",  label: "📍 Profondeur (km)",  format: { places: 1, digitSeparator: true } },
        { fieldName: "time",   label: "📅 Date & heure",     format: { dateFormat: "long-date-long-time" } },
        { fieldName: "type",   label: "🔬 Type d'événement" },
        { fieldName: "status", label: "✅ Statut USGS"       },
        { fieldName: "tsunami",label: "🌊 Alerte tsunami"    }
      ]
    }],
    actions: [{
      title: "Voir sur USGS",
      id: "usgs-link",
      className: "esri-icon-link"
    }]
  };

  /* ── Layer factory ── */
  function makeLayer(period) {
    return new GeoJSONLayer({
      url: BASE + period + ".geojson",
      renderer: renderer,
      popupTemplate: popupTemplate,
      orderBy: [{ field: "mag" }]
    });
  }

  var currentLayer = makeLayer("all_month");

  const map = new Map({
    basemap: "dark-gray-vector",
    layers: [currentLayer]
  });

  const view = new MapView({
    container: "viewDiv",
    map: map,
    zoom: 3,
    center: [10, 20],
    constraints: { rotationEnabled: false },
    popup: {
      dockEnabled: true,
      dockOptions: { position: "bottom-right", breakpoint: false }
    }
  });

  /* ── Ouvre lien USGS depuis popup ── */
  view.popup.on("trigger-action", function(e) {
    if (e.action.id === "usgs-link") {
      var url = view.popup.selectedFeature && view.popup.selectedFeature.attributes.url;
      if (url) window.open(url, "_blank");
    }
  });

  /* ── Stats + hide loading via fetch direct USGS ── */
  function fetchStats(period) {
    fetch(BASE + period + ".geojson")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var mags = (data.features || []).map(function(f) {
          return parseFloat((f.properties || {}).mag) || 0;
        });
        var count  = mags.length;
        var maxMag = count > 0 ? Math.max.apply(null, mags).toFixed(1) : "–";
        var sig    = mags.filter(function(m) { return m >= 5; }).length;
        document.getElementById("kv-count").textContent = count.toLocaleString("fr-FR");
        document.getElementById("kv-max").textContent   = maxMag;
        document.getElementById("kv-sig").textContent   = sig.toLocaleString("fr-FR");
        document.getElementById("loading").classList.add("hidden");
      })
      .catch(function() {
        document.getElementById("loading").classList.add("hidden");
      });
  }
  fetchStats("all_month");

  /* ── LayerView hook (filtre slider uniquement) ── */
  var layerView = null;
  function hookLayerView(layer) {
    view.whenLayerView(layer).then(function(lv) { layerView = lv; });
  }
  hookLayerView(currentLayer);

  /* ── Magnitude slider ── */
  document.getElementById("magSlider").addEventListener("input", function() {
    var v = parseFloat(this.value);
    document.getElementById("magVal").textContent = v.toFixed(1);
    if (layerView) {
      layerView.filter = v > 0 ? { where: "mag >= " + v } : null;
    }
  });

  /* ── Period selector ── */
  document.getElementById("periodSelect").addEventListener("change", function() {
    document.getElementById("magSlider").value = 0;
    document.getElementById("magVal").textContent = "0";
    document.getElementById("loading").classList.remove("hidden");
    document.getElementById("kv-count").textContent = "–";
    document.getElementById("kv-max").textContent   = "–";
    document.getElementById("kv-sig").textContent   = "–";
    layerView = null;

    var period = this.value;
    var newLayer = makeLayer(period);
    map.layers.removeAll();
    map.add(newLayer);
    currentLayer = newLayer;
    hookLayerView(newLayer);
    fetchStats(period);
  });

  /* ── Widgets ArcGIS (zoom, home, légende, recherche) ── */
  view.when(function() {
    view.ui.remove("zoom");

    view.ui.add(new Zoom({ view: view }),  { position: "top-left", index: 0 });
    view.ui.add(new Home({ view: view }),  { position: "top-left", index: 1 });

    var legend = new Legend({ view: view, style: { type: "card", layout: "stack" } });
    view.ui.add(
      new Expand({ view: view, content: legend, expanded: false, expandTooltip: "Légende" }),
      "bottom-left"
    );

    view.ui.add(new Search({ view: view }), { position: "top-right", index: 0 });
  });

});
</script>
</body>
</html>
