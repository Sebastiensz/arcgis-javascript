  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #09090f;
      --panel:  #10101e;
      --card:   #16162a;
      --border: #252540;
      --text:   #dde0ff;
      --muted:  #7070a0;
      --accent: #7c6af7;
      --films:    #e53935;
      --musique:  #1db954;
      --podcasts: #f39c12;
      --jeux:     #9b59b6;
      --docs:     #2980b9;
    }
    html, body { background: var(--bg); color: var(--text); font-family: "Segoe UI", -apple-system, Arial, sans-serif; font-size: 14px; min-height: 100%; }

    /* ── Header ─────────────────── */
    header {
      background: linear-gradient(135deg, #1a0a35 0%, #0b1840 100%);
      padding: 28px 32px 22px; border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 30px; font-weight: 800; background: linear-gradient(120deg,#a78bfa,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    header p  { color: var(--muted); font-size: 13px; margin-top: 5px; }
    #statsRow { display:flex; gap:28px; margin-top:18px; flex-wrap:wrap; }
    .st { text-align:center; }
    .st .v { font-size:24px; font-weight:800; color:white; }
    .st .l { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }

    /* ── Toolbar ────────────────── */
    #toolbar {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display:flex; flex-wrap:wrap; align-items:center;
      gap:10px; position:sticky; top:0; z-index:100;
    }
    #searchWrap { display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:6px 12px; flex:0 0 220px; }
    #searchWrap input { background:none; border:none; outline:none; color:var(--text); font-size:13px; width:100%; }
    .cats { display:flex; gap:4px; flex-wrap:wrap; }
    .cbt {
      padding:5px 13px; border-radius:20px; border:1px solid var(--border);
      background:var(--card); color:var(--muted); font-size:12px; font-weight:600;
      cursor:pointer; transition:all .15s; white-space:nowrap;
    }
    .cbt:hover { color:var(--text); }
    .cbt.on { color:white; border-color:transparent; }
    .cbt[data-c="all"].on     { background:var(--accent); }
    .cbt[data-c="films"].on   { background:var(--films); }
    .cbt[data-c="musique"].on { background:var(--musique); }
    .cbt[data-c="podcasts"].on{ background:var(--podcasts); }
    .cbt[data-c="jeux"].on    { background:var(--jeux); }
    .cbt[data-c="docs"].on    { background:var(--docs); }
    .cbt[data-c="favoris"].on { background:#f1c40f; color:#09090f; }
    .tgls { margin-left:auto; display:flex; gap:12px; align-items:center; }
    .tgl { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); cursor:pointer; white-space:nowrap; }
    .tgl input { accent-color:var(--accent); }

    /* ── Grid ───────────────────── */
    #grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:16px; padding:20px 24px; }

    /* ── Section header ─────────── */
    .shdr {
      grid-column:1/-1; display:flex; align-items:center; gap:10px;
      padding:4px 0 8px; border-bottom:1px solid var(--border); margin-bottom:4px;
    }
    .shdr h2 { font-size:16px; font-weight:700; }
    .shdr .cnt { font-size:11px; color:var(--muted); }

    /* ── Card ───────────────────── */
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:12px;
      padding:18px; display:flex; flex-direction:column; gap:10px;
      transition:transform .15s, box-shadow .15s; position:relative; overflow:hidden;
    }
    .card:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.5); }
    .stripe { position:absolute; top:0; left:0; right:0; height:3px; border-radius:12px 12px 0 0; }
    .ctop { display:flex; align-items:flex-start; gap:12px; }
    .cicon { font-size:34px; line-height:1; flex-shrink:0; }
    .ctitles { flex:1; min-width:0; }
    .cname { font-size:15px; font-weight:700; color:white; }
    .ctag  { font-size:11px; color:var(--muted); margin-top:3px; line-height:1.4; }
    .favbtn {
      background:none; border:none; cursor:pointer; font-size:20px;
      opacity:.35; transition:opacity .15s,transform .15s; flex-shrink:0; line-height:1;
    }
    .favbtn:hover { opacity:.8; transform:scale(1.2); }
    .favbtn.on { opacity:1; }
    .badges { display:flex; gap:5px; flex-wrap:wrap; }
    .badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; letter-spacing:.3px; }
    .b-free { background:#0f2a0f; color:#4ade80; border:1px solid #1d4a1d; }
    .b-ads  { background:#2a1d0a; color:#fbbf24; border:1px solid #4a2d0a; }
    .b-nads { background:#0f2a1a; color:#6ee7b7; border:1px solid #1d4a2d; }
    .b-fr   { background:#0a1a2a; color:#93c5fd; border:1px solid #1a2a4a; }
    .cdesc { font-size:12px; color:var(--muted); line-height:1.55; }
    .cbest { font-size:11px; color:#a78bfa; }
    .cbest strong { color:#c4b5fd; }
    .cbmk {
      font-size:10px; color:var(--muted); background:rgba(255,255,255,.04);
      border:1px solid var(--border); border-radius:6px; padding:5px 8px; line-height:1.5;
    }
    .cbmk span { color:var(--accent); font-weight:600; }
    .clink {
      display:block; text-align:center; padding:8px; border-radius:8px;
      border:1px solid var(--border); color:var(--text); text-decoration:none;
      font-size:12px; font-weight:600; transition:all .15s; margin-top:auto;
    }
    .clink:hover { color:white; border-color:var(--accent); background:rgba(124,106,247,.15); }

    #empty { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); display:none; }
    #empty .ei { font-size:52px; margin-bottom:14px; }
  </style>
</head>

/* ── Favoris ─────────────────────────────────────────────── */
var FK = "ehub_favs";
function loadF() { try { return JSON.parse(localStorage.getItem(FK)||"[]"); } catch(e){ return []; } }
function saveF(f){ localStorage.setItem(FK, JSON.stringify(f)); }
var favs = loadF();

/* ── État ────────────────────────────────────────────────── */
var st = { cat:"all", q:"", noAds:false, fr:false };

/* ── Filtrage ─────────────────────────────────────────────── */
function filtered() {
  return S.filter(function(s) {
    if (st.cat === "favoris" && !favs.includes(s.id)) return false;
    if (st.cat !== "all" && st.cat !== "favoris" && s.cat !== st.cat) return false;
    if (st.noAds && !s.noAds) return false;
    if (st.fr   && !s.fr)    return false;
    if (st.q) {
      var q = st.q.toLowerCase();
      return [s.name, s.tag, s.desc, s.best, s.bm].some(function(t){ return t.toLowerCase().includes(q); });
    }
    return true;
  });
}

/* ── Rendu ────────────────────────────────────────────────── */
function render() {
  var items = filtered();
  var grid  = document.getElementById("grid");
  grid.innerHTML = "";

  if (!items.length) {
    grid.innerHTML = '<div id="empty" style="display:block"><div class="ei">🔍</div><p>Aucune source ne correspond à vos filtres.</p></div>';
    updateStats(); return;
  }

  var cats = (st.cat === "all" || st.cat === "favoris")
    ? ["films","musique","podcasts","jeux","docs"] : [st.cat];

  cats.forEach(function(cat) {
    var ci = items.filter(function(s){ return s.cat === cat; });
    if (!ci.length) return;

    var h = document.createElement("div");
    h.className = "shdr";
    h.innerHTML = '<h2 style="color:' + COLORS[cat] + '">' + CLABELS[cat] + '</h2>'
      + '<span class="cnt">' + ci.length + ' source' + (ci.length > 1 ? 's' : '') + '</span>';
    grid.appendChild(h);

    ci.forEach(function(s) {
      var isFav = favs.includes(s.id);
      var col   = COLORS[s.cat];
      var card  = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<div class="stripe" style="background:' + col + '"></div>'
        + '<div class="ctop">'
        +   '<div class="cicon">' + s.icon + '</div>'
        +   '<div class="ctitles"><div class="cname">' + s.name + '</div><div class="ctag">' + s.tag + '</div></div>'
        +   '<button class="favbtn' + (isFav?' on':'') + '" data-id="' + s.id + '" title="Favori">' + (isFav?'⭐':'☆') + '</button>'
        + '</div>'
        + '<div class="badges">'
        +   '<span class="badge" style="background:' + col + '20;color:' + col + ';border:1px solid ' + col + '40">' + CLABELS[s.cat].split(' ').slice(1).join(' ') + '</span>'
        +   '<span class="badge b-free">GRATUIT</span>'
        +   (s.noAds ? '<span class="badge b-nads">SANS PUB</span>' : '<span class="badge b-ads">AVEC PUB</span>')
        +   (s.fr ? '<span class="badge b-fr">🇫🇷 FR</span>' : '')
        + '</div>'
        + '<div class="cdesc">' + s.desc + '</div>'
        + '<div class="cbest">✦ Idéal pour : <strong>' + s.best + '</strong></div>'
        + '<div class="cbmk">🔖 <span>Mot-clé favori :</span> ' + s.bm + '</div>'
        + '<a class="clink" href="' + s.url + '" target="_blank" rel="noopener noreferrer">→ Ouvrir ' + s.name + '</a>';

      card.querySelector(".favbtn").addEventListener("click", function(e) {
        e.preventDefault();
        var id = this.getAttribute("data-id");
        var i  = favs.indexOf(id);
        if (i >= 0) favs.splice(i, 1); else favs.push(id);
        saveF(favs); render();
      });
      grid.appendChild(card);
    });
  });
  updateStats();
}

function updateStats() {
  document.getElementById("sTotal").textContent = S.length;
  document.getElementById("sNoAds").textContent = S.filter(function(s){ return s.noAds; }).length;
  document.getElementById("sFr").textContent    = S.filter(function(s){ return s.fr;    }).length;
  document.getElementById("sFavs").textContent  = favs.length;
}

/* ── Événements ───────────────────────────────────────────── */
document.getElementById("srch").addEventListener("input", function(){ st.q = this.value; render(); });
document.querySelectorAll(".cbt").forEach(function(b) {
  b.addEventListener("click", function() {
    st.cat = this.getAttribute("data-c");
    document.querySelectorAll(".cbt").forEach(function(x){ x.classList.remove("on"); });
    this.classList.add("on"); render();
  });
});
document.getElementById("fNoAds").addEventListener("change", function(){ st.noAds = this.checked; render(); });
document.getElementById("fFr").addEventListener("change",    function(){ st.fr    = this.checked; render(); });

render();
</script>
